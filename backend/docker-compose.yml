services:
  mysql:
    image: mysql:8.0
    container_name: bingo-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bingo_manager}
      MYSQL_USER: ${MYSQL_USER:-bingo_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bingo_pass456}
      MYSQL_ROOT_HOST: '%'
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
