services:
  postgres:
    image: postgres:15-alpine
    container_name: bingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bingo_manager}
      POSTGRES_USER: ${POSTGRES_USER:-bingo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bingo_pass456}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bingo_app -d bingo_manager']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
